<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#1a6b2e">
    <title>Shamba Smart | Kilimo cha Kisasa</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Free AI: Puter.js (no API key needed) -->
    <script src="https://js.puter.com/v2/"></script>
    <!-- Free Image Recognition: TensorFlow.js + MobileNet (runs in browser) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest/dist/mobilenet.min.js"></script>

    <style>
        :root {
            --forest: #1a6b2e; --forest-dark: #0f4a1e; --forest-light: #2d8a45;
            --leaf: #4caf50; --sun: #f9a825; --danger: #d32f2f; --success: #388e3c;
            --bg: #f8f5f0; --bg-card: #fff; --text: #1a1a1a; --text-muted: #666;
            --border: #e0d9d0; --radius: 16px; --shadow: 0 4px 20px rgba(26,107,46,0.12);
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* ── NAV ── */
        .topnav { position: sticky; top: 0; z-index: 200; background: var(--forest-dark); color: #fff; padding: 0 16px; height: 58px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.1rem; color: #fff; cursor: pointer; }
        .nav-logo { width: 34px; height: 34px; background: linear-gradient(135deg, var(--leaf), var(--sun)); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .nav-logo-login { width: 90px; height: 90px; font-size: 3rem; margin: 0 auto 20px; border-radius: 20px; }
        .lang-switch { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; font-family: 'Outfit',sans-serif; }

        /* ── PAGES ── */
        .page { display: none; }
        .page.active { display: block; }
        .main { padding-bottom: 80px; }

        /* ── CARDS / BUTTONS ── */
        .card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 12px; }
        .cp { padding: 16px; }
        .btn { border: none; font-family: 'Outfit', sans-serif; font-weight: 700; padding: 14px 20px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 1rem; transition: .15s; }
        .btn-green { background: var(--forest); color: #fff; }
        .btn-green:hover { background: var(--forest-light); }
        .btn-outline { background: transparent; border: 2px solid var(--forest); color: var(--forest); }
        .btn-outline:hover { background: #e8f5e9; }
        .section-header { font-size: 1.05rem; font-weight: 700; padding: 14px 16px 0; color: var(--forest-dark); display: flex; align-items: center; gap: 8px; }

        /* ── QUICK FUNCTION ICONS (Home) ── */
        .fn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 12px; }
        .fn-card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 10px; text-align: center; cursor: pointer; transition: transform .15s, box-shadow .15s; }
        .fn-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,107,46,0.18); }
        .fn-card:active { transform: scale(.97); }
        .fn-icon { font-size: 2rem; margin-bottom: 8px; }
        .fn-icon i { font-size: 2rem; color: var(--forest); }
        .fn-label { font-size: 0.75rem; font-weight: 700; color: var(--forest-dark); }

        /* ── SENSOR GRID ── */
        .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .scard { padding: 16px; background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }
        .scard-icon { font-size: 1.5rem; }
        .scard-icon i { font-size: 1.5rem; color: var(--forest-light); }
        .scard-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-top: 6px; }
        .scard-val { font-size: 1.9rem; font-weight: 800; margin: 6px 0 2px; color: var(--forest-dark); }
        .scard-unit { font-size: 0.78rem; color: var(--text-muted); }
        .scard.warn .scard-val { color: var(--danger); }
        .scard.ok   .scard-val { color: var(--success); }

        /* ── MARKETPLACE ── */
        .market-item { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; border-bottom: 1px solid var(--border); gap: 10px; }
        .market-item:last-child { border-bottom: none; }
        .mi-icon { font-size: 1.6rem; flex-shrink: 0; }
        .mi-name { font-weight: 600; font-size: 0.95rem; }
        .mi-sub  { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
        .price { font-weight: 800; color: var(--forest); font-size: 1rem; }
        .trend-up   { color: var(--success); font-size: 0.78rem; }
        .trend-down { color: var(--danger);  font-size: 0.78rem; }

        /* ── MARKET TABS ── */
        .mkt-tabs { display: flex; overflow-x: auto; gap: 8px; padding: 10px 12px; scrollbar-width: none; }
        .mkt-tabs::-webkit-scrollbar { display: none; }
        .mkt-tab { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; border: 2px solid var(--border); background: var(--bg-card); font-family:'Outfit',sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; color: var(--text-muted); transition: .15s; white-space: nowrap; }
        .mkt-tab.active { background: var(--forest); border-color: var(--forest); color: #fff; }

        /* ── EXTERNAL PLATFORM LINKS ── */
        .platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 12px; }
        .platform-card { border-radius: 14px; padding: 14px 12px; text-align: center; cursor: pointer; text-decoration: none; display: block; transition: transform .15s, box-shadow .15s; box-shadow: var(--shadow); }
        .platform-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .platform-card:active { transform: scale(.97); }
        .platform-card .pc-icon { font-size: 2rem; margin-bottom: 6px; }
        .platform-card .pc-name { font-weight: 800; font-size: 0.85rem; }
        .platform-card .pc-sub  { font-size: 0.72rem; opacity: .85; margin-top: 3px; }
        .pc-jiji     { background: linear-gradient(135deg,#e65c00,#f9d423); color:#fff; }
        .pc-facebook { background: linear-gradient(135deg,#1877f2,#0d5bbf); color:#fff; }
        .pc-google   { background: linear-gradient(135deg,#4285f4,#34a853); color:#fff; }
        .pc-instagram{ background: linear-gradient(135deg,#e1306c,#f56040,#ffdc80); color:#fff; }
        .pc-maps     { background: linear-gradient(135deg,#0f9d58,#137333); color:#fff; }
        .pc-whatsapp { background: linear-gradient(135deg,#25d366,#128c7e); color:#fff; }

        /* ── VERIFIED SELLERS ── */
        .seller-card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); margin: 0 12px 12px; overflow: hidden; }
        .seller-header { display: flex; align-items: center; gap: 12px; padding: 14px; border-bottom: 1px solid var(--border); }
        .seller-avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink:0; }
        .seller-name   { font-weight: 700; font-size: 0.95rem; }
        .seller-loc    { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
        .seller-tags   { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px 14px; }
        .seller-tag    { background: #e8f5e9; color: var(--forest-dark); font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
        .seller-actions { display: flex; gap: 0; border-top: 1px solid var(--border); }
        .seller-btn    { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 8px; background: none; border: none; font-family:'Outfit',sans-serif; font-weight: 700; font-size: 0.8rem; cursor: pointer; border-right: 1px solid var(--border); color: var(--forest); transition: background .15s; text-decoration: none; }
        .seller-btn:last-child { border-right: none; }
        .seller-btn:hover { background: #e8f5e9; }
        .seller-btn.call  { color: #1976d2; }
        .seller-btn.wa    { color: #25d366; }
        .verified-badge   { margin-left: auto; background: #e8f5e9; color: var(--success); font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

        /* ── AG DOCTOR ── */
        .agdoc-card { background: linear-gradient(135deg,#1a6b2e,#2d8a45); color:#fff; border-radius: var(--radius); margin: 0 12px 12px; padding: 18px; box-shadow: var(--shadow); }
        .agdoc-card h3 { font-size: 1rem; font-weight: 800; margin-bottom: 6px; }
        .agdoc-card p  { font-size: 0.85rem; opacity:.9; margin-bottom: 14px; line-height:1.5; }
        .agdoc-list    { display: flex; flex-direction: column; gap: 10px; }
        .agdoc-row     { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px; }
        .agdoc-avatar  { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink:0; }
        .agdoc-name    { font-weight: 700; font-size: 0.88rem; }
        .agdoc-spec    { font-size: 0.73rem; opacity:.8; margin-top: 2px; }
        .agdoc-btn     { margin-left: auto; background: #25d366; border: none; color: #fff; padding: 8px 14px; border-radius: 20px; font-family:'Outfit',sans-serif; font-weight: 700; font-size: 0.78rem; cursor: pointer; display: flex; align-items: center; gap: 5px; flex-shrink:0; }

        /* ── CLASSIFIEDS ── */
        .classified-card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); margin: 0 12px 12px; overflow: hidden; }
        .classified-img  { width: 100%; height: 130px; object-fit: cover; display: block; }
        .classified-img-placeholder { width:100%; height:100px; display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);font-size:2.5rem; }
        .classified-body { padding: 12px 14px; }
        .classified-title{ font-weight: 700; font-size: 0.95rem; }
        .classified-price{ color: var(--forest); font-weight: 800; font-size: 1.1rem; margin: 4px 0; }
        .classified-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 10px; flex-wrap:wrap; margin-bottom:10px; }
        .classified-actions { display:flex; gap:8px; }
        .cla-btn { flex:1; padding: 9px; border-radius: 10px; border: none; font-family:'Outfit',sans-serif; font-weight:700; font-size:0.8rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
        .cla-btn-wa   { background:#25d366; color:#fff; }
        .cla-btn-call { background:#e3f2fd; color:#1976d2; }
        .compose-classified { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow); margin:0 12px 12px; padding:16px; }
        .compose-classified h4 { font-size:0.95rem; font-weight:700; color:var(--forest-dark); margin-bottom:12px; display:flex;align-items:center;gap:6px; }
        .cc-input { width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:10px; font-family:'Outfit',sans-serif; font-size:0.9rem; outline:none; margin-bottom:8px; }
        .cc-input:focus { border-color:var(--forest); }
        .cc-row { display:flex; gap:8px; }
        .cc-post { background:var(--forest); color:#fff; border:none; border-radius:10px; padding:11px 20px; font-family:'Outfit',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; }

        /* ── AI ── */
        #page-ai { display: none; flex-direction: column; }
        #page-ai.active { display: flex; height: calc(100vh - 120px); }
        .ai-bubble-wrap { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .ai-bubble { padding: 12px 16px; border-radius: 16px; max-width: 88%; font-size: 0.93rem; line-height: 1.55; }
        .ai-bubble.user { background: var(--forest); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-bubble.bot  { background: #fff; color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
        .ai-input-row { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); background: #fff; flex-shrink: 0; }
        .ai-input { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 0.93rem; outline: none; }
        .ai-input:focus { border-color: var(--forest); }
        .ai-send { padding: 12px 16px; background: var(--forest); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 1.1rem; }
        .api-key-bar { background: #fff8e1; border-bottom: 1px solid #ffe082; padding: 10px 14px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .api-key-input { flex: 1; padding: 8px 12px; border: 1px solid #ffe082; border-radius: 8px; font-size: 0.82rem; font-family: monospace; outline: none; }
        .api-key-save { background: var(--sun); border: none; border-radius: 8px; padding: 8px 14px; font-weight: 700; cursor: pointer; font-size: 0.82rem; white-space: nowrap; }

        /* ── DISEASE ── */
        .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 48px 20px; text-align: center; cursor: pointer; background: var(--bg-card); transition: .2s; }
        .upload-zone:hover, .upload-zone.drag { border-color: var(--forest); background: #f0faf2; }
        .upload-zone .uz-icon { font-size: 2.8rem; }
        .upload-zone p { color: var(--text-muted); margin-top: 10px; font-size: 0.93rem; }
        .disease-result { display: none; background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; margin-top: 14px; }
        .disease-result.show { display: block; }
        .dr-badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 700; margin-bottom: 12px; }
        .dr-badge.healthy  { background: #e8f5e9; color: var(--success); }
        .dr-badge.infected { background: #ffebee; color: var(--danger); }

        /* ── HOME HERO ── */
        .hero { background: linear-gradient(135deg, var(--forest-dark), var(--forest-light)); color: #fff; padding: 26px 20px 28px; border-radius: 0 0 28px 28px; margin-bottom: 16px; }
        .hero h2 { font-size: 1.4rem; font-weight: 800; }
        .hero p  { opacity: .85; margin-top: 6px; font-size: 0.93rem; }
        .quick-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
        .qs { background: rgba(255,255,255,0.15); padding: 12px; border-radius: 12px; }
        .qs-val   { font-size: 1.35rem; font-weight: 800; }
        .qs-label { font-size: 0.72rem; opacity: .8; margin-top: 2px; }

        /* ── PUMP ── */
        .pump-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; }
        .pump-label { font-weight: 700; font-size: 0.98rem; }
        .pump-sub   { font-size: 0.76rem; color: var(--text-muted); margin-top: 2px; }
        .toggle { width: 52px; height: 28px; background: #ccc; border-radius: 14px; border: none; cursor: pointer; position: relative; transition: background .3s; flex-shrink: 0; }
        .toggle::after { content: ''; position: absolute; width: 22px; height: 22px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: left .3s; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
        .toggle.on { background: var(--leaf); }
        .toggle.on::after { left: 27px; }

        /* ── NEWS ── */
        .news-item  { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
        .news-item:last-child { border-bottom: none; }
        .news-dot   { width: 8px; height: 8px; border-radius: 50%; background: var(--leaf); flex-shrink: 0; margin-top: 6px; }
        .news-title { font-weight: 600; font-size: 0.92rem; }
        .news-meta  { font-size: 0.73rem; color: var(--text-muted); margin-top: 3px; }

        /* ── COMMUNITY ── */
        .post-card { background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); margin: 0 12px 14px; overflow: hidden; }
        .post-header { display: flex; align-items: center; gap: 12px; padding: 14px 14px 10px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--leaf), var(--sun)); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .post-name { font-weight: 700; font-size: 0.92rem; }
        .post-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
        .post-body  { padding: 0 14px 12px; font-size: 0.9rem; line-height: 1.55; color: var(--text); }
        .post-actions { display: flex; gap: 0; border-top: 1px solid var(--border); }
        .post-action { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; background: none; border: none; font-size: 0.82rem; color: var(--text-muted); cursor: pointer; font-family: 'Outfit',sans-serif; transition: color .15s; border-right: 1px solid var(--border); }
        .post-action:last-child { border-right: none; }
        .post-action:hover { color: var(--forest); }
        .post-action i { font-size: 1rem; }
        .compose-bar { display: flex; gap: 10px; padding: 12px; background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); margin: 0 12px 12px; align-items: center; }
        .compose-input { flex: 1; padding: 11px 14px; border: 1px solid var(--border); border-radius: 20px; font-family: 'Outfit',sans-serif; font-size: 0.9rem; outline: none; background: var(--bg); }
        .compose-send { background: var(--forest); color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; flex-shrink: 0; }

        /* ── PROFILE ── */
        .profile-hero { background: linear-gradient(135deg, var(--forest-dark), var(--forest-light)); color: #fff; text-align: center; padding: 32px 20px 28px; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 14px; }
        .profile-name   { font-size: 1.3rem; font-weight: 800; }
        .profile-email  { font-size: 0.85rem; opacity: .8; margin-top: 4px; }
        .profile-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .profile-row:last-child { border-bottom: none; }
        .profile-row i { font-size: 1.2rem; color: var(--forest); width: 24px; 
        
</script>
</body>
</html>
